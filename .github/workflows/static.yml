# Deploy static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Global permissions — deploy job needs pages + id-token
# update-date-modified overrides with contents: write at job level
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ── JOB 1: Update dateModified in any edited tool pages ──────────────────
  update-date-modified:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needs write to commit back
    outputs:
      updated: ${{ steps.patch.outputs.updated }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2     # need HEAD~1 for diff

      - name: Detect modified tool pages
        id: detect
        run: |
          # grep exits 1 when no matches — use || true to prevent bash -e failure
          git diff --name-only HEAD~1 HEAD \
            | grep -E 'tools/.+/index\.html' > changed_files.txt || true

          if [ -s changed_files.txt ]; then
            echo "Found modified tool pages:"
            cat changed_files.txt
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No tool pages modified — skipping patch."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update dateModified in changed files
        id: patch
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          UPDATED=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              # Only sed if dateModified field actually exists in the file
              if grep -q '"dateModified"' "$file"; then
                sed -i "s/\"dateModified\": \"[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\"/\"dateModified\": \"$TODAY\"/" "$file"
                echo "✅ Updated: $file → $TODAY"
                UPDATED=$((UPDATED + 1))
              else
                echo "⚠️  Skipped (no dateModified field): $file"
              fi
            fi
          done < changed_files.txt
          echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"
          echo "Total files updated: $UPDATED"

      - name: Commit updated files
        if: steps.detect.outputs.has_changes == 'true' && steps.patch.outputs.updated != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only tool index files — not the entire repo
          git add 'tools/**/index.html'
          # Commit only if there are staged changes
          git diff --cached --quiet \
            || git commit -m "chore: update dateModified to $(date -u +%Y-%m-%d) [skip ci]"
          git push

  # ── JOB 2: Deploy to GitHub Pages ────────────────────────────────────────
  deploy:
    needs: update-date-modified   # wait so the commit lands before deploy picks up files
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main              # re-checkout after potential bot commit above

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ── JOB 3: Submit sitemap via IndexNow ───────────────────────────────────
  submit-sitemap:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Submit sitemap URLs to IndexNow
        uses: jakob-bagterp/index-now-submit-sitemap-urls-action@v1
        with:
          host: upendra-thunuguntla.github.io
          api_key: ${{ secrets.INDEX_NOW_API_KEY }}
          api_key_location: https://upendra-thunuguntla.github.io/${{ secrets.INDEX_NOW_API_KEY }}.txt
          sitemap_locations: https://upendra-thunuguntla.github.io/sitemap.xml
